version: 2
updates:
  # Python (uv)
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      python-minor:
        update-types: ["minor", "patch"]

  - package-ecosystem: "uv"
    directory: "/apps/api"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "backend"

  - package-ecosystem: "uv"
    directory: "/crawlers"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "crawlers"

  # Node (pnpm)
  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      next-major:
        patterns:
          - "next"
          - "react"
          - "react-dom"
        update-types: ["major"]
      next-minor:
        patterns:
          - "next"
          - "react"
          - "react-dom"
        update-types: ["minor", "patch"]
      shadcn-radix:
        patterns:
          - "@radix-ui/*"
        update-types: ["minor", "patch"]
      tailwind-stack:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
          - "framer-motion"
        update-types: ["minor", "patch"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"

  # Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "docker"
