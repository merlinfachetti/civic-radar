name: 🔧 Parser Broken
description: Report that a parser stopped working (likely a source layout change)
title: "[Parser]: <source_id> — short description"
labels: ["parser", "bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! Source layouts change all the time. 🔧

  - type: input
    id: source_id
    attributes:
      label: Source ID
      placeholder: cebraspe
    validations:
      required: true

  - type: input
    id: parser_version
    attributes:
      label: Parser version
      description: Check it in `crawlers/crawlers/sources/<id>/parser.py`
      placeholder: "1.2.0"
    validations:
      required: true

  - type: textarea
    id: symptoms
    attributes:
      label: Observed symptoms
      description: What is being extracted incorrectly, or not being extracted at all?
      placeholder: |
        - `salary_min` returning `null` for all items since 2026-05-25
        - Anomaly detected: items extracted dropped from ~50/day to 0
    validations:
      required: true

  - type: input
    id: example_url
    attributes:
      label: Example URL
      description: Page where the parser is failing
      placeholder: https://www.cebraspe.org.br/concursos/...

  - type: textarea
    id: fixture
    attributes:
      label: New fixture
      description: Attach the captured HTML/PDF (drag-and-drop)
      placeholder: |
        To generate a fixture:
        curl -A "CivicRadar/1.0" <url> > new_fixture.html

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I confirmed the current parser_version is up to date
          required: true
        - label: I compared with the old fixture to see what changed
