name: 📡 Add New Source
description: Suggest or implement a new data source (board, portal, aggregator)
title: "[Source]: Add <source name>"
labels: ["source", "good first issue", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new source! 📡

        See [`docs/DATA_SOURCES.md`](../blob/main/docs/DATA_SOURCES.md) for the full guide.

  - type: input
    id: source_name
    attributes:
      label: Source name
      description: Full name of the board / agency / portal
      placeholder: e.g. Vunesp
    validations:
      required: true

  - type: input
    id: source_id
    attributes:
      label: Proposed source ID
      description: kebab-case, unique
      placeholder: vunesp
    validations:
      required: true

  - type: input
    id: source_url
    attributes:
      label: Base URL
      placeholder: https://www.vunesp.com.br/
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - organizing_board (organizing board)
        - agency (public agency)
        - portal (institutional portal)
        - aggregator (aggregator)
    validations:
      required: true

  - type: dropdown
    id: quality
    attributes:
      label: Estimated quality level
      options:
        - high (official, predictable structure)
        - medium (institutional, variable structure)
        - low (aggregator without clear traceability)
    validations:
      required: true

  - type: textarea
    id: structure
    attributes:
      label: Source structure
      description: Simple HTML? JS-heavy? PDFs? Does it expose RSS/JSON?
      placeholder: |
        - List at /concursos/abertos.html (server-side HTML)
        - Details at /concurso/<id>
        - Editais are separate PDFs
    validations:
      required: true

  - type: textarea
    id: robots
    attributes:
      label: robots.txt and terms
      description: Relevant content from /robots.txt and ToS, if applicable
      render: text
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I confirmed the source does not yet exist in `crawlers/crawlers/sources/`
          required: true
        - label: I read `docs/DATA_SOURCES.md` before opening this issue
          required: true
        - label: robots.txt allows civilized crawling on the required paths
          required: true
        - label: I am willing to open a PR with fixtures + parser
