name: 🐛 Bug Report
description: Report incorrect behavior in CivicRadar
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! 🙏

        **Heads up:** for security vulnerabilities, **do not** use a public issue — follow [SECURITY.md](../blob/main/docs/SECURITY.md).

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
      placeholder: e.g. When filtering by state SP, opportunities from other states also show up.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimum steps to reproduce the bug
      placeholder: |
        1. Go to `/opportunities`
        2. Select the filter "State: SP"
        3. Observe the results
      render: markdown
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - API (backend)
        - Web (frontend)
        - Crawler / Parser
        - CLI
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: source
    attributes:
      label: Affected source (if applicable)
      description: Cebraspe, FGV, PCI Concursos, etc.
      placeholder: cebraspe

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Version, OS, Docker vs native
      placeholder: |
        - Commit SHA: abc1234
        - OS: macOS 14.5
        - Runtime: Docker compose
        - Browser (if web): Chrome 130
      render: markdown
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs or attach a screenshot
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues to avoid duplicates
          required: true
        - label: I have read the [Code of Conduct](../blob/main/docs/CODE_OF_CONDUCT.md)
          required: true
