name: 💡 Feature Request
description: Suggest new functionality or an improvement
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! ✨

        To help us understand it, describe the _why_ (motivation) and the _what_ (proposal).

  - type: textarea
    id: motivation
    attributes:
      label: Motivation / Problem
      description: Which problem are you trying to solve?
      placeholder: e.g. When filtering by multiple states, I cannot combine it with the area filter.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: How do you imagine it being solved?
      placeholder: e.g. Allow repeated query params. `?state=SP&state=RJ&area=ti`
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Which other approaches did you think about? Why does this one look better?

  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - API (backend)
        - Web (frontend)
        - Crawlers
        - CLI
        - Documentation
        - i18n
        - Accessibility
        - Performance
        - Security
        - Developer Experience
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Perceived priority
      options:
        - Low — quality of life
        - Medium — useful for many users
        - High — blocks a common use case
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to open a PR for this
        - label: I am willing to test it when someone implements it
        - label: I just want to suggest it
